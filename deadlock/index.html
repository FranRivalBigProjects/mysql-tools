<style>

    --bg:         #020617;
    --surface:    #080f1e;
    --surface-2:  #0d1829;
    --border:     #162035;
    --accent:     #f59e0b;
    --accent-2:   #fbbf24;
    --accent-dim: rgba(245,158,11,.07);
    --green:      #22c55e;
    --green-dim:  rgba(34,197,94,.08);
    --yellow:     #fbbf24;
    --yellow-dim: rgba(251,191,36,.07);
    --red:        #ef4444;
    --red-dim:    rgba(239,68,68,.08);
    --blue:       #38bdf8;
    --blue-dim:   rgba(56,189,248,.08);
    --purple:     #a855f7;
    --text:       #e2e8f0;
    --muted:      #64748b;

    --font-display: "Space Grotesk", sans-serif;
    --font-mono:    "Space Mono", monospace;
    --radius:    8px;
    --radius-lg: 16px;
    --transition: 220ms cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

body::before {
    content: "";

    background-image: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(245,158,11,.012) 40px, rgba(245,158,11,.012) 41px);
    pointer-events: none; z-index: 0;
}

.wrapper {
    position: relative; z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 0 24px;
    width: 100%;
    flex: 1;
}

nav {
    position: relative; z-index: 2;
    padding: 18px 24px;
    max-width: 880px;
    margin: 0 auto;
    width: 100%;
}

nav a {
    font-family: var(--font-mono);
    font-size: .72rem;
    letter-spacing: .06em;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color var(--transition);
}

nav a:hover { color: var(--accent); }
nav a::before { content: "<-"; }

header {
    padding: 36px 0 32px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp .5s ease both;
}

.header-chip {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--red);
    background: var(--red-dim);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: 4px;
    padding: 3px 10px;
    display: inline-block;
    margin-bottom: 14px;
}

header h1 {
    font-size: clamp(1.3rem, 3vw, 2rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: -.02em;
    margin-bottom: 10px;
}

header h1 .acc { color: var(--red); }
header p { font-size: .9rem; color: var(--muted); font-weight: 300; max-width: 540px; }

.tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--red);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin: 32px 0;
    animation: fadeUp .5s .08s ease both;
}

/* samples */
.samples-row {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}

.sample-btn {
    font-family: var(--font-mono);
    font-size: .65rem;
    letter-spacing: .04em;
    color: var(--muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
}

.sample-btn:hover { color: var(--accent); border-color: rgba(245,158,11,.3); }

.editor-label {
    font-family: var(--font-mono);
    font-size: .62rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.editor-label::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
}

.editor-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
    transition: border-color var(--transition), box-shadow var(--transition);
}

.editor-wrap:focus-within {
    border-color: rgba(239,68,68,.4);
    box-shadow: 0 0 0 3px rgba(239,68,68,.08);
}

textarea {
    display: block;
    width: 100%;
    min-height: 220px;
    background: var(--surface-2);
    border: none;
    outline: none;
    padding: 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .78rem;
    line-height: 1.65;
    resize: vertical;
    tab-size: 4;
}

textarea::placeholder { color: var(--muted); opacity: .4; }

.btn-run {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 13px 24px;
    font-family: var(--font-mono);
    font-size: .82rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
}

.btn-run:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(239,68,68,.35); }
.btn-run:active { transform: translateY(0); }

#result { margin-top: 24px; display: none; animation: fadeUp .35s ease both; }
#result.visible { display: block; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* deadlock header */
.dl-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.dl-badge {
    font-family: var(--font-mono);
    font-size: .72rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 4px 12px;
}

.dl-badge-dead  { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(239,68,68,.2); }
.dl-badge-clean { background: var(--green-dim);   color: var(--green);  border: 1px solid rgba(34,197,94,.2); }

.dl-title { font-size: 1.1rem; font-weight: 600; color: #fff; }

/* transaction panels */
.tx-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: start;
    margin-bottom: 20px;
}

.tx-panel {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
}

.tx-panel.tx-victim { border-color: rgba(239,68,68,.3); }
.tx-panel.tx-winner { border-color: rgba(34,197,94,.25); }

.tx-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.tx-panel.tx-victim .tx-header { background: rgba(239,68,68,.05); }
.tx-panel.tx-winner .tx-header { background: rgba(34,197,94,.04); }

.tx-name {
    font-family: var(--font-mono);
    font-size: .72rem;
    letter-spacing: .06em;
    text-transform: uppercase;
}

.tx-victim .tx-name { color: var(--red); }
.tx-winner .tx-name { color: var(--green); }

.tx-badge {
    font-family: var(--font-mono);
    font-size: .6rem;
    letter-spacing: .04em;
    border-radius: 3px;
    padding: 2px 8px;
}

.tx-victim .tx-badge { background: var(--red-dim); color: var(--red); }
.tx-winner .tx-badge { background: var(--green-dim); color: var(--green); }

.tx-body { padding: 12px 14px; }

.tx-row {

    align-items: flex-start;

    margin-bottom: 8px;
    font-family: var(--font-mono);

.tx-val   { color: var(--text); word-break: break-all; flex: 1; }

.lock-item.lk-holding { border-left: 3px solid var(--yellow); }

function loadSample(key) {
    document.getElementById("codeInput").value = SAMPLES[key];

// ── Parsers ───────────────────────────────────────────────

function extractDeadlockSection(src) {
    var start = src.indexOf("LATEST DETECTED DEADLOCK");
    if (start === -1) { return null; }
    // find section end (next === separator or end)
    var end = src.indexOf("\n---\n", start + 30);
    if (end === -1) { end = src.length; }
    return src.slice(start, end);
}

function parseTransaction(block) {
    var tx = { id: "", threadId: "", activeTime: "", query: "", locks: [] };

    var idM = block.match(/TRANSACTION\s+(\d+)/);
    if (idM) { tx.id = idM[1]; }

    var threadM = block.match(/MySQL thread id\s+(\d+)/);
    if (threadM) { tx.threadId = threadM[1]; }

    var activeM = block.match(/ACTIVE\s+([\d.]+)\s+sec/);
    if (activeM) { tx.activeTime = activeM[1] + "s"; }

    // Last SQL statement
    var sqlLines = block.split("\n");
    for (var i = sqlLines.length - 1; i >= 0; i--) {
        var l = sqlLines[i].trim();
        if (/^(SELECT|INSERT|UPDATE|DELETE|REPLACE)\s/i.test(l)) {
            tx.query = l;
            break;
        }
    }

    // Extract table names from lock lines
    var tableRe = /table `([^`]+)`\.`([^`]+)`/g;
    var m;
    while ((m = tableRe.exec(block)) !== null) {
        tx.locks.push({ db: m[1], table: m[2] });
    }

    return tx;
}

function parseLockMode(block) {
    var modes = [];
    if (/lock_mode X locks rec but not gap waiting/i.test(block)) { modes.push({ type: "lk-waiting", label: "Waiting", desc: "Waiting for X (exclusive) row lock" }); }
    if (/lock_mode X locks rec but not gap(?! waiting)/i.test(block)) { modes.push({ type: "lk-holding", label: "Holding", desc: "Holds X (exclusive) row lock" }); }
    if (/lock_mode X locks gap/i.test(block)) { modes.push({ type: "lk-gap", label: "Gap Lock", desc: "Holds gap lock preventing inserts in range" }); }
    if (/lock_mode X insert intention waiting/i.test(block)) { modes.push({ type: "lk-waiting", label: "Insert Intention", desc: "Waiting to insert -- blocked by gap lock" }); }
    if (/lock_mode S(?! waiting)/i.test(block)) { modes.push({ type: "lk-holding", label: "Holding S", desc: "Holds shared (S) lock" }); }
    if (/lock_mode S.*waiting/i.test(block)) { modes.push({ type: "lk-waiting", label: "Waiting S->X", desc: "Upgrading shared lock to exclusive -- classic deadlock pattern" }); }
    return modes;
}

function detectDeadlockType(section) {
    if (/lock_mode X insert intention/i.test(section)) { return "gap_insert"; }
    if (/lock_mode S.*waiting.*lock_mode X/i.test(section)) { return "lock_upgrade"; }
    if (/UPDATE.*UPDATE/is.test(section)) { return "write_write"; }
    return "classic";
}

function buildFixes(tx1, tx2, dlType, section) {
    var fixes = [];
    var tables = [];
    var seen = {};
    [tx1.locks, tx2.locks].forEach(function(locks) {
        locks.forEach(function(l) {
            var key = l.db + "." + l.table;
            if (!seen[key]) { seen[key] = true; tables.push(key); }
        });
    });

    // Fix 1: always consistent lock ordering
    if (tables.length >= 2) {
        fixes.push({
            cls: "fi-critical", icon: "[!]",
            title: "Access tables in consistent order across all transactions",
            desc: "Both transactions access " + tables.join(" and ") + " but in opposite order. This is the root cause. If every transaction always locks " + tables[0] + " before " + tables[1] + ", the cycle cannot form.",
            code: "-- Always access in the same order:\nSTART TRANSACTION;\nSELECT ... FROM " + (tables[0] || "table1") + " WHERE ... FOR UPDATE;  -- lock first\nSELECT ... FROM " + (tables[1] || "table2") + " WHERE ... FOR UPDATE;  -- lock second\nCOMMIT;"
        });
    }

    if (dlType === "gap_insert") {
        fixes.push({
            cls: "fi-critical", icon: "[!]",
            title: "Gap lock deadlock -- caused by concurrent INSERTs on same index range",
            desc: "Two transactions hold gap locks on the same index range and each is waiting for an insert intention lock the other holds. This typically happens with non-unique secondary indexes.",
            code: "-- Option 1: Use READ COMMITTED isolation (disables gap locks)\nSET SESSION TRANSACTION ISOLATION LEVEL READ COMMITTED;\n\n-- Option 2: Insert with unique key to avoid gap lock acquisition\n-- Option 3: Use INSERT IGNORE or INSERT ... ON DUPLICATE KEY UPDATE"
        });
    }

    if (dlType === "lock_upgrade") {
        fixes.push({
            cls: "fi-critical", icon: "[!]",
            title: "Lock upgrade deadlock -- S lock upgrading to X while another transaction holds S",
            desc: "Both transactions acquired a shared lock (S) on the same row, then both tried to upgrade to exclusive (X). Neither can proceed because each holds the S lock the other needs to release.",
            code: "-- Use SELECT ... FOR UPDATE from the start instead of SELECT then UPDATE:\nSTART TRANSACTION;\nSELECT * FROM sessions WHERE user_id = ? FOR UPDATE;  -- acquire X lock immediately\nINSERT INTO sessions ... ;\nCOMMIT;"
        });
    }

    fixes.push({
        cls: "fi-high", icon: "[~]",
        title: "Keep transactions short -- reduce lock hold time",
        desc: "Shorter transactions hold locks for less time, reducing the window for deadlocks. Move business logic (validation, formatting) outside the transaction. Only include the actual database writes inside BEGIN/COMMIT.",
        code: "-- Bad: logic inside transaction\nSTART TRANSACTION;\n  result = validate_order(order_id);   -- slow, holds locks\n  UPDATE orders SET ...\nCOMMIT;\n\n-- Good: logic before transaction\nresult = validate_order(order_id);    -- no locks held\nSTART TRANSACTION;\n  UPDATE orders SET ...\nCOMMIT;"
    });

    fixes.push({
        cls: "fi-medium", icon: "[i]",
        title: "Implement retry logic for deadlock errors (error 1213)",
        desc: "MySQL automatically rolls back the victim transaction with error 1213 (ER_LOCK_DEADLOCK). Application code must catch this and retry. Without retry logic, the operation silently fails.",
        code: "-- Application retry pattern (pseudocode):\nfor attempt in 1..3:\n  try:\n    db.begin()\n    run_queries()\n    db.commit()\n    break\n  catch DeadlockError (1213):\n    db.rollback()\n    sleep(attempt * 50ms)  -- exponential backoff\n    continue\n  raise MaxRetriesExceeded"
    });

    fixes.push({
        cls: "fi-medium", icon: "[i]",
        title: "Enable deadlock logging for ongoing monitoring",
        desc: "By default MySQL only keeps the last deadlock. Enable logging to catch all deadlocks in production.",
        code: "SET GLOBAL innodb_print_all_deadlocks = ON;\n-- Deadlocks will appear in the MySQL error log\n-- Or query: SHOW ENGINE INNODB STATUS\\G"
    });

    return fixes;
}

// ── Main ──────────────────────────────────────────────────
function detect() {
    var src      = document.getElementById("codeInput").value;
    var resultEl = document.getElementById("result");

    if (!src.trim()) {
        alert("Please paste the output of SHOW ENGINE INNODB STATUS or a deadlock log section.");
        return;
    }

    var section = extractDeadlockSection(src);

    if (!section) {
        resultEl.innerHTML =
            "<div class=\"divider\"></div>" +
            "<div class=\"no-deadlock\">No LATEST DETECTED DEADLOCK section found in this log. MySQL has not detected a deadlock recently, or the log has been rotated.</div>";
        resultEl.classList.add("visible");
        return;
    }

    // Split into tx1 and tx2 blocks
    var parts = section.split(/\*\*\* \(\d+\) TRANSACTION:/);
    var block1 = parts[1] || "";
    var block2 = parts[2] || "";

    var tx1 = parseTransaction(block1);
    var tx2 = parseTransaction(block2);
    var dlType = detectDeadlockType(section);

    // Which tx was rolled back
    var victimM = section.match(/WE ROLL BACK TRANSACTION \((\d+)\)/i);
    var victimNum = victimM ? parseInt(victimM[1], 10) : 1;

    var tx1Role = victimNum === 1 ? "tx-victim" : "tx-winner";
    var tx2Role = victimNum === 2 ? "tx-victim" : "tx-winner";
    var tx1RoleLabel = victimNum === 1 ? "Rolled Back" : "Survived";
    var tx2RoleLabel = victimNum === 2 ? "Rolled Back" : "Survived";

    var locks1 = parseLockMode(block1);
    var locks2 = parseLockMode(block2);

    var dlTypeLabel = { gap_insert: "Gap Lock / Insert Intention", lock_upgrade: "Lock Upgrade (S->X)", write_write: "Concurrent Writes", classic: "Classic Circular Wait" }[dlType] || "Unknown";

    // Header
    var headerHTML =
        "<div class=\"dl-header\">" +
            "<span class=\"dl-badge dl-badge-dead\">Deadlock Detected</span>" +
            "<span class=\"dl-title\">Type: " + dlTypeLabel + "</span>" +
        "</div>";

    // Transaction panels
    function txPanel(tx, role, roleLabel, locks) {
        var rowsHTML = "";
        rowsHTML += "<div class=\"tx-row\"><span class=\"tx-key\">TX ID</span><span class=\"tx-val highlight\">" + (tx.id || "unknown") + "</span></div>";
        rowsHTML += "<div class=\"tx-row\"><span class=\"tx-key\">Thread</span><span class=\"tx-val\">" + (tx.threadId || "—") + "</span></div>";
        rowsHTML += "<div class=\"tx-row\"><span class=\"tx-key\">Active</span><span class=\"tx-val\">" + (tx.activeTime || "—") + "</span></div>";
        if (tx.query) {
            rowsHTML += "<div class=\"tx-row\"><span class=\"tx-key\">Query</span><span class=\"tx-val\">" + tx.query.substring(0,80) + (tx.query.length > 80 ? "..." : "") + "</span></div>";
        }
        if (tx.locks.length > 0) {
            rowsHTML += "<div class=\"tx-row\"><span class=\"tx-key\">Tables</span><span class=\"tx-val\">" + tx.locks.map(function(l) { return l.db + "." + l.table; }).join(", ") + "</span></div>";
        }

        return "<div class=\"tx-panel " + role + "\">" +
            "<div class=\"tx-header\"><span class=\"tx-name\">Transaction " + (role === "tx-victim" ? "1" : "2") + "</span><span class=\"tx-badge\">" + roleLabel + "</span></div>" +
            "<div class=\"tx-body\">" + rowsHTML + "</div>" +
        "</div>";
    }

    var txHTML =
        "<div class=\"tx-grid\">" +
            txPanel(tx1, tx1Role, tx1RoleLabel, locks1) +
            "<div class=\"conflict-arrow\"><div class=\"arrow-line\"></div><div class=\"arrow-icon\">⇅</div><div class=\"arrow-label\">DEADLOCK</div></div>" +
            txPanel(tx2, tx2Role, tx2RoleLabel, locks2) +
        "</div>";

    // Lock details
    var allLocks = [];
    locks1.forEach(function(l) { allLocks.push({ tx: "TX1", lock: l }); });
    locks2.forEach(function(l) { allLocks.push({ tx: "TX2", lock: l }); });

    var lockHTML = "";
    if (allLocks.length > 0) {
        lockHTML =
            "<div class=\"lock-section\">" +
            "<div class=\"lock-title\">Lock State Breakdown</div>" +
            "<div class=\"lock-list\">" +
            allLocks.map(function(item) {
                return "<div class=\"lock-item " + item.lock.type + "\">" +
                    "<span class=\"lk-type\">" + item.lock.label + "</span>" +
                    "<div class=\"lk-body\"><div class=\"lk-desc\">" + item.tx + ": " + item.lock.desc + "</div>" +
                    (item.lock.type === "lk-waiting" ? "<div class=\"lk-note\">This transaction is blocked waiting for a lock the other transaction holds.</div>" : "") +
                    "</div>" +
                "</div>";
            }).join("") +
            "</div></div>";
    }

    // Fixes
    var fixes = buildFixes(tx1, tx2, dlType, section);
    var fixHTML =
        "<div class=\"fix-list\">" +
        fixes.map(function(f) {
            return "<div class=\"fix-item " + f.cls + "\">" +
                "<span class=\"fi-icon\">" + f.icon + "</span>" +
                "<div class=\"fi-body\">" +
                    "<div class=\"fi-title\">" + f.title + "</div>" +
                    "<div class=\"fi-desc\">" + f.desc + "</div>" +
                    (f.code ? "<pre class=\"fi-code\">" + f.code + "</pre>" : "") +

            "</div>" +
        "</div>";
    }).join("") +
    "</div>";

resultEl.innerHTML =
    "<div class=\"divider\"></div>" +
    headerHTML +
    txHTML +
    "<div class=\"divider\"></div>" +
    lockHTML +
    "<div class=\"divider\"></div>" +
    "<div class=\"lock-title\" style=\"margin-bottom:10px\">Resolution Strategies</div>" +
    fixHTML;

resultEl.classList.add("visible");
resultEl.scrollIntoView({ behavior: "smooth", block: "nearest" });

}
</script>
